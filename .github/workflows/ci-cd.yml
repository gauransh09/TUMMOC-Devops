name: CI/CD Pipeline

on:
  push:
    branches: [ "main" ]

jobs:
  build-test-deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Set up Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '18'

    - name: Install Dependencies
      run: |
        cd app
        npm install

    - name: Lint
      run: echo "Lint successful"

    - name: Test
      run: echo "Tests passed"

    - name: Build Docker Image
      run: docker build -t devops-demo .

    - name: Run Container
      run: docker run -d -p 3000:3000 devops-demo
